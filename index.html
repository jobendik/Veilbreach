<!DOCTYPE html>

<!--
================================================================================
  VEILBREACH: RELIC DECK
  Single-file roguelike deckbuilder prototype

  Genre:
  - Single-player turn-based roguelike deckbuilder.

  Controls:
  - Click "Start New Run" from the main menu.
  - Click cards in your hand to play them.
  - Cards that target enemies must be selected first, then an enemy must be clicked.
  - Click "End Turn" when finished.
  - After combat, choose one card reward, skip, upgrade, remove, heal, or choose a relic when offered.

  Core mechanics:
  - Draw pile, hand, discard pile, and exhaust pile.
  - Energy-based card play.
  - Player HP, block, statuses, powers, relics, and deck growth.
  - Enemy intent previews.
  - Three normal encounters, a mid-run event branch, and a final boss encounter.
  - Reusable effect engine for damage, block, draw, energy, statuses, exhaust, powers, and deck manipulation.
  - Statuses include Weak, Vulnerable, Poison, Strength, Dexterity, Frail, Thorns, Burn, and Mark.

  Save/load behavior:
  - The current run is automatically saved to localStorage after major actions.
  - Refreshing the browser allows continuing the run from the main menu.
  - "Clear Save" safely deletes the saved run.
  - A run can also be abandoned by starting a new one.

  Card definition and asset pipeline:
  - Cards are defined in CARD_DB below as structured data objects.
  - Each card supports id, name, cost, type, rarity, description, targetType, effects,
    imagePath, assetKey, fallbackColor, frameStyle, and upgrade data.
  - To replace procedural placeholder card visuals with real PNG art, add an imagePath
    to any card in CARD_DB, for example:
      imagePath: "assets/cards/void_strike.png"
    The renderer will automatically use the image in the card art area while keeping
    the title, cost, type, rarity, and description as readable DOM overlays.
  - Card logic is resolved from data effects. Card visuals are rendered separately
    in UI.renderCardElement().
================================================================================
-->

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Veilbreach: Relic Deck</title>
<style>
  :root {
    --bg0: #070811;
    --bg1: #0e1020;
    --panel: rgba(19, 23, 42, 0.86);
    --panel2: rgba(29, 35, 61, 0.9);
    --line: rgba(174, 199, 255, 0.18);
    --line2: rgba(174, 199, 255, 0.34);
    --text: #eef4ff;
    --muted: #9faad0;
    --gold: #f5c35b;
    --blue: #6bd6ff;
    --violet: #b47cff;
    --green: #7af6a3;
    --red: #ff617d;
    --orange: #ffae5a;
    --shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
    --card-w: 172px;
    --card-h: 248px;
  }

* { box-sizing: border-box; }

html, body {
margin: 0;
min-height: 100%;
background:
radial-gradient(circle at 18% 12%, rgba(104, 70, 212, 0.32), transparent 32%),
radial-gradient(circle at 82% 18%, rgba(58, 195, 255, 0.18), transparent 30%),
radial-gradient(circle at 50% 90%, rgba(255, 102, 84, 0.13), transparent 38%),
linear-gradient(135deg, #05060d 0%, #0a0d1a 44%, #070814 100%);
color: var(--text);
font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
overflow-x: hidden;
}

body::before {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
background-image:
linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size: 52px 52px;
mask-image: radial-gradient(circle at 50% 35%, black 0%, transparent 75%);
opacity: 0.5;
z-index: 0;
}

body::after {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.38) 78%);
z-index: 1;
}

button {
font: inherit;
color: var(--text);
border: 1px solid var(--line2);
background:
linear-gradient(180deg, rgba(92, 113, 180, 0.32), rgba(32, 38, 74, 0.86)),
rgba(25, 31, 57, 0.9);
border-radius: 14px;
padding: 11px 16px;
cursor: pointer;
transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
box-shadow: 0 10px 26px rgba(0,0,0,0.24);
}

button:hover:not(:disabled) {
transform: translateY(-1px);
border-color: rgba(134, 213, 255, 0.72);
box-shadow: 0 14px 34px rgba(36, 174, 255, 0.16);
}

button:active:not(:disabled) { transform: translateY(1px); }

button:disabled {
cursor: not-allowed;
opacity: 0.45;
filter: grayscale(0.5);
}

.primary {
background:
linear-gradient(180deg, rgba(102, 222, 255, 0.95), rgba(84, 76, 255, 0.78)),
#3440ff;
border-color: rgba(182, 239, 255, 0.7);
color: #06101d;
font-weight: 900;
text-shadow: 0 1px 0 rgba(255,255,255,0.45);
}

.danger {
background:
linear-gradient(180deg, rgba(255, 87, 116, 0.9), rgba(122, 35, 57, 0.9)),
#551c2a;
border-color: rgba(255, 128, 150, 0.6);
}

.ghost {
background: rgba(255,255,255,0.04);
box-shadow: none;
}

.small-btn {
padding: 7px 10px;
font-size: 12px;
border-radius: 10px;
}

#app {
position: relative;
z-index: 2;
min-height: 100vh;
}

.screen {
min-height: 100vh;
padding: 24px;
display: flex;
flex-direction: column;
}

.menu-screen,
.result-screen {
align-items: center;
justify-content: center;
text-align: center;
}

.logo {
width: min(920px, 94vw);
padding: 40px;
border: 1px solid var(--line);
background:
linear-gradient(180deg, rgba(25, 31, 62, 0.88), rgba(7, 9, 19, 0.74)),
radial-gradient(circle at 50% 0%, rgba(118, 83, 255, 0.28), transparent 44%);
border-radius: 34px;
box-shadow: var(--shadow);
position: relative;
overflow: hidden;
}

.logo::before {
content: "";
position: absolute;
inset: -2px;
background: conic-gradient(from 160deg, transparent, rgba(112, 216, 255, 0.32), transparent, rgba(198, 105, 255, 0.26), transparent);
opacity: 0.34;
filter: blur(18px);
z-index: -1;
}

.eyebrow {
text-transform: uppercase;
letter-spacing: 0.28em;
font-weight: 800;
font-size: 12px;
color: var(--blue);
margin-bottom: 10px;
}

h1 {
margin: 0;
font-size: clamp(42px, 8vw, 92px);
line-height: 0.9;
letter-spacing: -0.06em;
text-transform: uppercase;
text-shadow: 0 0 42px rgba(101, 159, 255, 0.36);
}

h2, h3 { margin: 0; }

.subtitle {
max-width: 760px;
margin: 20px auto 0;
color: var(--muted);
font-size: 18px;
line-height: 1.55;
}

.menu-actions {
display: flex;
flex-wrap: wrap;
gap: 12px;
justify-content: center;
margin-top: 30px;
}

.menu-grid {
display: grid;
grid-template-columns: repeat(3, minmax(0, 1fr));
gap: 14px;
margin-top: 28px;
}

.feature-card {
text-align: left;
border: 1px solid var(--line);
background: rgba(255,255,255,0.04);
border-radius: 20px;
padding: 16px;
min-height: 126px;
}

.feature-card strong {
display: block;
color: var(--text);
margin-bottom: 8px;
}

.feature-card span {
color: var(--muted);
font-size: 13px;
line-height: 1.45;
}

.topbar {
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
gap: 16px;
margin-bottom: 16px;
}

.run-title {
display: flex;
gap: 12px;
align-items: center;
}

.pill {
display: inline-flex;
align-items: center;
gap: 7px;
padding: 7px 10px;
border-radius: 999px;
background: rgba(255,255,255,0.06);
border: 1px solid var(--line);
color: var(--muted);
font-weight: 700;
font-size: 12px;
white-space: nowrap;
}

.pill strong { color: var(--text); }
.pill.energy { color: #06101d; background: linear-gradient(135deg, #78e0ff, #b886ff); border-color: rgba(222, 250, 255, 0.68); }
.pill.hp { color: white; background: linear-gradient(135deg, rgba(225, 57, 93, 0.7), rgba(92, 21, 43, 0.7)); border-color: rgba(255, 129, 156, 0.44); }
.pill.block { color: white; background: linear-gradient(135deg, rgba(80, 170, 255, 0.68), rgba(45, 52, 126, 0.72)); border-color: rgba(137, 202, 255, 0.45); }

.combat-layout {
display: grid;
grid-template-rows: auto minmax(320px, 1fr) auto;
gap: 16px;
min-height: calc(100vh - 48px);
}

.arena {
display: grid;
grid-template-columns: 300px 1fr 280px;
gap: 16px;
min-height: 370px;
}

.panel {
border: 1px solid var(--line);
background: var(--panel);
border-radius: 24px;
box-shadow: 0 18px 48px rgba(0,0,0,0.3);
overflow: hidden;
}

.panel-header {
padding: 14px 16px;
border-bottom: 1px solid var(--line);
background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
display: flex;
justify-content: space-between;
align-items: center;
gap: 12px;
}

.panel-body { padding: 16px; }

.stat-row {
display: flex;
justify-content: space-between;
align-items: center;
margin: 9px 0;
color: var(--muted);
font-size: 14px;
}

.stat-row strong { color: var(--text); }

.bar {
height: 14px;
border-radius: 99px;
overflow: hidden;
border: 1px solid rgba(255,255,255,0.12);
background: rgba(0,0,0,0.28);
box-shadow: inset 0 0 12px rgba(0,0,0,0.45);
}

.bar > span {
display: block;
height: 100%;
border-radius: 99px;
transition: width 0.22s ease;
}

.hpbar > span { background: linear-gradient(90deg, #ff4266, #ff9b62); }
.enemybar > span { background: linear-gradient(90deg, #ff4d76, #ffc25f); }
.bossbar > span { background: linear-gradient(90deg, #a06bff, #ff5f92); }

.status-list {
display: flex;
flex-wrap: wrap;
gap: 6px;
min-height: 28px;
align-content: flex-start;
}

.status {
position: relative;
display: inline-flex;
gap: 5px;
align-items: center;
padding: 4px 7px;
border-radius: 999px;
border: 1px solid var(--line);
background: rgba(255,255,255,0.06);
font-size: 11px;
font-weight: 800;
cursor: help;
}

.status[data-tip]:hover::after,
.card[data-tip]:hover::after,
.relic[data-tip]:hover::after {
content: attr(data-tip);
position: absolute;
z-index: 999;
bottom: calc(100% + 8px);
left: 50%;
width: 220px;
transform: translateX(-50%);
padding: 9px 10px;
border-radius: 12px;
border: 1px solid rgba(190,220,255,0.35);
background: rgba(6, 9, 20, 0.96);
color: var(--text);
font-weight: 600;
font-size: 12px;
line-height: 1.35;
box-shadow: 0 18px 42px rgba(0,0,0,0.5);
pointer-events: none;
}

.relic[data-tip]:hover::after {
bottom: auto;
top: calc(100% + 8px);
}

.relic-row {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-top: 14px;
}

.relic {
position: relative;
width: 42px;
height: 42px;
border-radius: 13px;
display: grid;
place-items: center;
border: 1px solid rgba(241, 216, 143, 0.35);
background:
radial-gradient(circle at 35% 25%, rgba(255,255,255,0.22), transparent 24%),
linear-gradient(135deg, rgba(245, 195, 91, 0.2), rgba(131, 75, 255, 0.15));
box-shadow: inset 0 0 20px rgba(255,255,255,0.04), 0 8px 18px rgba(0,0,0,0.24);
font-size: 20px;
}

.battlefield {
position: relative;
border: 1px solid var(--line);
background:
linear-gradient(180deg, rgba(16, 23, 47, 0.7), rgba(7, 8, 17, 0.84)),
radial-gradient(circle at 50% 0%, rgba(88, 103, 255, 0.22), transparent 52%);
border-radius: 28px;
overflow: hidden;
min-height: 370px;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.battlefield::before {
content: "";
position: absolute;
inset: 0;
background:
radial-gradient(circle at 50% 46%, rgba(118, 216, 255, 0.14), transparent 20%),
linear-gradient(90deg, transparent 0 49%, rgba(255,255,255,0.08) 50%, transparent 51%),
linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
background-size: auto, auto, 100% 42px;
opacity: 0.45;
pointer-events: none;
}

.turn-banner {
position: absolute;
top: 14px;
left: 50%;
transform: translateX(-50%);
z-index: 5;
border: 1px solid var(--line);
background: rgba(7, 10, 24, 0.82);
backdrop-filter: blur(10px);
padding: 7px 12px;
border-radius: 999px;
color: var(--muted);
font-size: 12px;
font-weight: 900;
text-transform: uppercase;
letter-spacing: 0.12em;
}

.enemy-area {
position: relative;
z-index: 3;
display: flex;
flex-wrap: wrap;
gap: 18px;
justify-content: center;
align-items: flex-start;
padding: 58px 20px 20px;
min-height: 250px;
}

.enemy {
position: relative;
width: 202px;
min-height: 224px;
border-radius: 24px;
border: 1px solid rgba(194, 216, 255, 0.22);
background:
radial-gradient(circle at 50% 18%, rgba(255,255,255,0.16), transparent 22%),
linear-gradient(180deg, rgba(32, 40, 75, 0.94), rgba(12, 14, 30, 0.94));
padding: 14px;
box-shadow: 0 20px 40px rgba(0,0,0,0.34);
cursor: pointer;
transition: transform 0.15s ease, border-color 0.15s ease, filter 0.15s ease;
overflow: visible;
}

.enemy:hover {
transform: translateY(-3px);
border-color: rgba(108, 214, 255, 0.75);
}

.enemy.targetable {
box-shadow: 0 0 0 2px rgba(107, 214, 255, 0.5), 0 20px 40px rgba(0,0,0,0.34);
}

.enemy.dead {
opacity: 0.35;
filter: grayscale(1);
pointer-events: none;
}

.enemy.hit,
.player-panel.hit {
animation: hitFlash 0.28s ease;
}

@keyframes hitFlash {
0% { filter: brightness(2.4) saturate(1.8); transform: translateX(0); }
25% { transform: translateX(-4px); }
50% { transform: translateX(4px); }
100% { filter: none; transform: translateX(0); }
}

.enemy-silhouette {
height: 78px;
margin: 8px auto 10px;
width: 84px;
border-radius: 42% 42% 35% 35%;
background:
radial-gradient(circle at 48% 24%, rgba(255,255,255,0.36), transparent 8%),
radial-gradient(circle at 50% 55%, rgba(0,0,0,0.32), transparent 44%),
linear-gradient(135deg, rgba(255, 99, 132, 0.9), rgba(116, 93, 255, 0.8));
box-shadow: 0 0 38px rgba(255, 95, 135, 0.26);
position: relative;
}

.enemy-silhouette::before,
.enemy-silhouette::after {
content: "";
position: absolute;
top: 30px;
width: 28px;
height: 52px;
background: inherit;
border-radius: 22px 22px 10px 10px;
opacity: 0.9;
}

.enemy-silhouette::before { left: -20px; transform: rotate(-18deg); }
.enemy-silhouette::after { right: -20px; transform: rotate(18deg); }

.enemy-name {
display: flex;
justify-content: space-between;
gap: 8px;
font-weight: 900;
font-size: 14px;
}

.intent {
margin: 10px 0;
padding: 9px;
border-radius: 13px;
border: 1px solid rgba(255,255,255,0.12);
background: rgba(0,0,0,0.22);
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
color: var(--muted);
font-size: 12px;
}

.intent strong {
color: var(--text);
font-size: 13px;
}

.player-stage {
z-index: 2;
display: flex;
justify-content: center;
padding: 0 20px 26px;
}

.player-avatar {
min-width: 250px;
border: 1px solid rgba(116, 216, 255, 0.22);
background:
linear-gradient(180deg, rgba(30, 47, 81, 0.72), rgba(11, 15, 31, 0.86)),
radial-gradient(circle at 50% 0%, rgba(107, 214, 255, 0.18), transparent 60%);
border-radius: 24px;
padding: 14px;
text-align: center;
box-shadow: 0 18px 44px rgba(0,0,0,0.36);
}

.hand-zone {
display: grid;
grid-template-columns: auto 1fr auto;
gap: 14px;
align-items: end;
}

.pile-stats {
display: flex;
gap: 8px;
flex-direction: column;
width: 118px;
}

.pile {
border: 1px solid var(--line);
background: rgba(255,255,255,0.045);
border-radius: 16px;
padding: 10px;
text-align: center;
}

.pile b {
display: block;
font-size: 22px;
}

.pile span {
color: var(--muted);
font-size: 11px;
text-transform: uppercase;
letter-spacing: 0.08em;
font-weight: 800;
}

.hand {
display: flex;
gap: 12px;
justify-content: center;
align-items: flex-end;
min-height: 270px;
padding: 10px 10px 0;
overflow-x: auto;
}

.combat-actions {
display: flex;
flex-direction: column;
gap: 10px;
width: 140px;
}

.card {
position: relative;
width: var(--card-w);
height: var(--card-h);
flex: 0 0 var(--card-w);
border-radius: 18px;
border: 1px solid rgba(255,255,255,0.18);
background: #15192d;
overflow: hidden;
cursor: pointer;
box-shadow: 0 16px 30px rgba(0,0,0,0.42);
transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease, border-color 0.16s ease;
transform-origin: bottom center;
user-select: none;
}

.hand .card:hover {
transform: translateY(-18px) scale(1.06);
z-index: 20;
box-shadow: 0 24px 52px rgba(0,0,0,0.58), 0 0 0 2px rgba(111, 215, 255, 0.22);
}

.card.selected {
transform: translateY(-24px) scale(1.07);
border-color: rgba(114, 224, 255, 0.95);
box-shadow: 0 26px 60px rgba(0,0,0,0.62), 0 0 0 3px rgba(114, 224, 255, 0.42);
}

.card.unplayable {
filter: grayscale(0.65) brightness(0.72);
}

.card.playing {
animation: cardPlay 0.38s ease forwards;
}

@keyframes cardPlay {
0% { transform: translateY(-20px) scale(1.05); opacity: 1; }
100% { transform: translateY(-120px) scale(0.78) rotate(5deg); opacity: 0; }
}

.card-bg {
position: absolute;
inset: 0;
background:
radial-gradient(circle at 50% 24%, rgba(255,255,255,0.22), transparent 23%),
linear-gradient(160deg, var(--c1), var(--c2));
}

.card-bg::after {
content: "";
position: absolute;
inset: 8px;
border-radius: 14px;
border: 1px solid rgba(255,255,255,0.16);
box-shadow: inset 0 0 32px rgba(0,0,0,0.34);
}

.card-art {
position: absolute;
left: 12px;
right: 12px;
top: 44px;
height: 82px;
border-radius: 14px;
border: 1px solid rgba(255,255,255,0.18);
overflow: hidden;
background:
radial-gradient(circle at 60% 35%, rgba(255,255,255,0.28), transparent 17%),
radial-gradient(circle at 40% 55%, rgba(0,0,0,0.28), transparent 38%),
linear-gradient(135deg, rgba(255,255,255,0.08), rgba(0,0,0,0.18));
}

.card-art img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
}

.sigil {
position: absolute;
inset: 0;
display: grid;
place-items: center;
font-size: 42px;
opacity: 0.86;
text-shadow: 0 0 22px rgba(255,255,255,0.32);
}

.card-top {
position: absolute;
inset: 10px 10px auto 10px;
height: 30px;
display: flex;
align-items: center;
gap: 7px;
}

.cost {
width: 30px;
height: 30px;
border-radius: 50%;
display: grid;
place-items: center;
color: #06101d;
font-weight: 1000;
background: linear-gradient(180deg, #e4fbff, #72dfff 48%, #8a82ff);
box-shadow: 0 0 18px rgba(113, 219, 255, 0.45);
border: 1px solid rgba(255,255,255,0.6);
}

.card-title {
flex: 1;
font-weight: 1000;
font-size: 13px;
line-height: 1.05;
text-shadow: 0 2px 6px rgba(0,0,0,0.72);
}

.card-type {
position: absolute;
top: 132px;
left: 12px;
right: 12px;
display: flex;
justify-content: space-between;
gap: 8px;
color: rgba(255,255,255,0.76);
font-size: 10px;
font-weight: 900;
text-transform: uppercase;
letter-spacing: 0.08em;
}

.rarity {
color: var(--gold);
}

.card-desc {
position: absolute;
left: 12px;
right: 12px;
bottom: 12px;
height: 88px;
padding: 10px;
border-radius: 13px;
border: 1px solid rgba(255,255,255,0.12);
background: rgba(5, 7, 16, 0.62);
color: rgba(244, 248, 255, 0.94);
font-size: 12px;
line-height: 1.28;
display: flex;
align-items: center;
justify-content: center;
text-align: center;
}

.card.upgraded .card-title::after {
content: "+";
color: var(--gold);
margin-left: 2px;
}

.log {
height: 190px;
overflow: auto;
color: var(--muted);
font-size: 12px;
line-height: 1.45;
}

.log div {
padding: 6px 0;
border-bottom: 1px solid rgba(255,255,255,0.06);
}

.notice {
border: 1px solid rgba(107, 214, 255, 0.22);
background: rgba(107, 214, 255, 0.08);
border-radius: 15px;
padding: 10px 12px;
color: #c7f3ff;
font-size: 13px;
line-height: 1.4;
}

.reward-screen,
.event-screen {
align-items: center;
justify-content: center;
}

.reward-box,
.event-box {
width: min(1100px, 96vw);
border: 1px solid var(--line);
background:
linear-gradient(180deg, rgba(25, 31, 62, 0.92), rgba(8, 10, 22, 0.9)),
radial-gradient(circle at 50% 0%, rgba(118, 83, 255, 0.20), transparent 50%);
border-radius: 30px;
padding: 28px;
box-shadow: var(--shadow);
}

.reward-cards {
display: flex;
flex-wrap: wrap;
gap: 18px;
justify-content: center;
margin: 26px 0;
}

.reward-cards .card {
transform: none;
}

.reward-cards .card:hover {

  uid(prefix = "id") {
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
  },

  clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  },

  choice(list) {
    return list[Math.floor(Math.random() * list.length)];
  },

  sample(list, count) {
    const pool = [...list];
    const out = [];
    while (pool.length && out.length < count) {
      out.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
    }
    return out;
  },

  weightedChoice(entries) {
    const total = entries.reduce((sum, e) => sum + e.weight, 0);
    let roll = Math.random() * total;
    for (const entry of entries) {
      roll -= entry.weight;
      if (roll <= 0) return entry.item;
    }
    return entries[entries.length - 1].item;
  },

  shuffle(list) {
    const arr = [...list];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  },

  deepClone(value) {
    return JSON.parse(JSON.stringify(value));
  },

  formatSigned(n) {
    return n >= 0 ? `+${n}` : String(n);
  },

  sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
};

/* =============================================================================

============================================================================= */

const AudioSystem = {
  ctx: null,
  enabled: true,

  ensure() {
    if (!this.enabled) return null;
    if (!this.ctx) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) {
        this.enabled = false;
        return null;
      }
      this.ctx = new AudioContext();
    }
    if (this.ctx.state === "suspended") this.ctx.resume();
    return this.ctx;
  },

  tone({ freq = 440, duration = 0.08, type = "sine", gain = 0.045, slide = 0 }) {
    const ctx = this.ensure();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), ctx.currentTime + duration);
    amp.gain.setValueAtTime(0.0001, ctx.currentTime);
    amp.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(amp).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration + 0.02);
  },

  chord(notes, duration = 0.16, gain = 0.035) {
    notes.forEach((freq, i) => {
      setTimeout(() => this.tone({ freq, duration, gain, type: "triangle" }), i * 30);
    });
  },

  click() { this.tone({ freq: 660, duration: 0.04, type: "square", gain: 0.025 }); },
  card() { this.chord([420, 620, 840], 0.11, 0.028); },
  hit() { this.tone({ freq: 140, duration: 0.12, type: "sawtooth", gain: 0.05, slide: -60 }); },
  block() { this.chord([260, 390], 0.13, 0.035); },
  victory() { this.chord([523, 659, 784, 1046], 0.24, 0.04); },
  defeat() { this.chord([300, 220, 150], 0.28, 0.048); },
  poison() { this.tone({ freq: 210, duration: 0.16, type: "triangle", gain: 0.035, slide: -80 }); }
};

function getCardData(cardInstance) {
  const base = CARD_DB[cardInstance.cardId];
  if (!base) throw new Error(`Missing card data: ${cardInstance.cardId}`);
  if (!cardInstance.upgraded) return base;
  return {
    ...base,
    ...base.upgrade,
    id: base.id,
    type: base.type,
    rarity: base.rarity,
    targetType: base.targetType,
    fallbackColor: base.fallbackColor,
    imagePath: base.imagePath,
    assetKey: base.assetKey,
    upgrade: base.upgrade,
    upgraded: true
  };
}

function createCardInstance(cardId, upgraded = false) {
  return { uid: Util.uid("card"), cardId, upgraded, tempCost: null };
}

/* =============================================================================
   SAVE / LOAD
============================================================================= */

const SaveSystem = {
  save(state) {
    if (!CONFIG.autoSave) return;
    const data = {
      version: 1,
      timestamp: Date.now(),
      run: state.run,
      screen: state.screen,
      combat: state.combat ? this.stripCombatForSave(state.combat) : null,
      reward: state.reward || null,
      event: state.event || null,
      log: state.log.slice(-20)
    };
    localStorage.setItem(CONFIG.saveKey, JSON.stringify(data));
  },

  stripCombatForSave(combat) {
    return Util.deepClone(combat);
  },

  load() {
    try {
      const raw = localStorage.getItem(CONFIG.saveKey);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || !parsed.run) return null;
      return parsed;
    } catch {
      return null;
    }
  },

  clear() {
    localStorage.removeItem(CONFIG.saveKey);
  },

  hasSave() {
    return !!this.load();
  }
};

   GAME STATE

const Game = {
  state: {
    screen: "menu",
    run: null,
    combat: null,
    reward: null,
    event: null,
    selectedCardUid: null,
    log: []
  },

  newRun() {
    const deck = STARTING_DECK.map(id => createCardInstance(id));
    this.state = {
      screen: "combat",
      run: {
        id: Util.uid("run"),
        encounterIndex: 0,
        maxHp: CONFIG.startingMaxHp,
        hp: CONFIG.startingMaxHp,
        deck,
        relics: [],
        defeated: 0,
        upgradedThisRun: 0,
        removedThisRun: 0,
        seed: Math.floor(Math.random() * 999999)
      },
      combat: null,
      reward: null,
      event: null,
      selectedCardUid: null,
      log: []
    };
    CombatEngine.startEncounter(0);
  },

  continueRun() {
    const data = SaveSystem.load();
    if (!data) return;
    this.state.screen = data.screen || "menu";
    this.state.run = data.run;
    this.state.combat = data.combat;
    this.state.reward = data.reward;
    this.state.event = data.event;
    this.state.selectedCardUid = null;
    this.state.log = data.log || [];
    if (this.state.screen === "combat" && this.state.combat) {
      CombatEngine.bindState(this.state);
      CombatEngine.ensureEnemyIntents();
    }
    UI.render();
  },

  clearSave() {
    if (confirm("Delete the saved run? This cannot be undone.")) {
      SaveSystem.clear();
      this.state.screen = "menu";
      this.state.run = null;
      this.state.combat = null;
      UI.render();
    }
  },

  log(message) {
    this.state.log.unshift(message);
    this.state.log = this.state.log.slice(0, 80);
  },

  setScreen(screen) {
    this.state.screen = screen;
    SaveSystem.save(this.state);
    UI.render();
  }
};

/* =============================================================================
   COMBAT ENGINE
============================================================================= */

const CombatEngine = {
  state: Game.state,

  bindState(state) {
    this.state = state;
  },

  startEncounter(index) {
    this.bindState(Game.state);
    const encounter = ENCOUNTERS[index];
    const enemies = encounter.enemies.map(enemyId => {
      const def = ENEMY_DB[enemyId];
      return {
        uid: Util.uid("enemy"),
        id: enemyId,
        name: def.name,
        maxHp: def.maxHp,
        hp: def.maxHp,
        block: 0,
        statuses: {},
        intent: null,
        dead: false,
        boss: !!def.boss,
        phaseAnnounced: false
      };
    });

    const combatDeck = this.state.run.deck.map(c => ({ ...c, tempCost: null }));
    this.state.combat = {
      encounterIndex: index,
      encounterName: encounter.name,
      turn: 0,
      phase: "player",
      energy: CONFIG.startingEnergy,
      handSize: CONFIG.startingHandSize,
      drawPile: Util.shuffle(combatDeck),
      hand: [],
      discardPile: [],
      exhaustPile: [],
      enemies,
      powers: {
        stormEngine: 0
      },
      cardsPlayedThisTurn: 0,
      firstTurn: true
    };

    this.state.selectedCardUid = null;
    Game.log(`Entered ${encounter.name}.`);
    this.applyRelicHook("onCombatStart");
    this.ensureEnemyIntents();
    this.startPlayerTurn();
  },

  applyRelicHook(hook) {
    const relicIds = this.state.run.relics || [];
    for (const id of relicIds) {
      const relic = RELIC_DB[id];
      if (relic && typeof relic[hook] === "function") relic[hook](this);
    }
  },

  ensureEnemyIntents() {
    const combat = this.state.combat;
    if (!combat) return;
    for (const enemy of combat.enemies) {
      if (enemy.dead || enemy.hp <= 0) continue;
      enemy.intent = ENEMY_DB[enemy.id].chooseIntent(enemy, combat);
    }
  },

  startPlayerTurn() {
    const combat = this.state.combat;
    combat.turn += 1;
    combat.phase = "player";
    combat.cardsPlayedThisTurn = 0;
    combat.energy = CONFIG.startingEnergy + (combat.powers.stormEngine || 0);
    this.state.player = this.getPlayerCombatProxy();

    this.tickStartOfTurn(this.state.player);
    this.resetTempCosts();
    this.gainBlockFromPlated(this.state.player);

    this.applyRelicHook("onTurnStart");
    this.drawCards(combat.handSize);
    this.decrementPlayerTurnStatuses();

    Game.log(`Turn ${combat.turn}: Your turn.`);
    SaveSystem.save(this.state);
    UI.render();
  },

  getPlayerCombatProxy() {
    if (!this.state.run.statuses) this.state.run.statuses = {};
    if (typeof this.state.run.block !== "number") this.state.run.block = 0;
    return this.state.run;
  },

  resetTempCosts() {
    const zones = ["hand", "drawPile", "discardPile", "exhaustPile"];
    for (const zone of zones) {
      this.state.combat[zone].forEach(card => { card.tempCost = null; });
    }
  },

  drawCards(amount) {
    const combat = this.state.combat;
    for (let i = 0; i < amount; i++) {
      if (combat.drawPile.length === 0) {
        if (combat.discardPile.length === 0) break;
        combat.drawPile = Util.shuffle(combat.discardPile);
        combat.discardPile = [];
        Game.log("Discard pile reshuffled into draw pile.");
      }
      const card = combat.drawPile.pop();
      if (card) combat.hand.push(card);
    }
  },

  canPlayCard(card) {
    const data = getCardData(card);
    const cost = card.tempCost !== null && card.tempCost !== undefined ? card.tempCost : data.cost;
    return this.state.combat.phase === "player" && this.state.combat.energy >= cost;
  },

  selectOrPlayCard(cardUid) {
    const combat = this.state.combat;
    const card = combat.hand.find(c => c.uid === cardUid);
    if (!card) return;
    const data = getCardData(card);
    if (!this.canPlayCard(card)) {
      UI.shakeCard(cardUid);
      Toast.show("Not enough energy.");
      return;
    }

    AudioSystem.click();

    if (data.targetType === "enemy") {
      const living = combat.enemies.filter(e => !e.dead && e.hp > 0);
      if (living.length === 1) {
        this.playCard(cardUid, living[0].uid);
      } else {
        this.state.selectedCardUid = this.state.selectedCardUid === cardUid ? null : cardUid;
        UI.render();
      }
      return;
    }

    this.playCard(cardUid, null);
  },

  playSelectedCardOnEnemy(enemyUid) {
    const selected = this.state.selectedCardUid;
    if (!selected) return;
    this.playCard(selected, enemyUid);
  },

  async playCard(cardUid, enemyUid) {
    const combat = this.state.combat;
    if (!combat || combat.phase !== "player") return;
    const cardIndex = combat.hand.findIndex(c => c.uid === cardUid);
    if (cardIndex < 0) return;
    const card = combat.hand[cardIndex];
    if (!this.canPlayCard(card)) return;

    const data = getCardData(card);
    const targetEnemy = enemyUid ? combat.enemies.find(e => e.uid === enemyUid && !e.dead) : null;

    if (data.targetType === "enemy" && !targetEnemy) {
      Toast.show("Choose a target.");
      return;
    }

    const cost = card.tempCost !== null && card.tempCost !== undefined ? card.tempCost : data.cost;
    combat.energy -= cost;
    combat.cardsPlayedThisTurn += 1;
    combat.hand.splice(cardIndex, 1);
    this.state.selectedCardUid = null;

    UI.animateCardPlay(cardUid);
    AudioSystem.card();

    await this.resolveCard(card, data, targetEnemy);

    if (data.exhaustSelf || card.exhaustSelf) {
      combat.exhaustPile.push(card);
      Game.log(`${data.name} exhausted.`);
    } else {
      combat.discardPile.push(card);
    }

    this.checkEnemyDeaths();
    if (this.areAllEnemiesDefeated()) {
      await Util.sleep(260);
      this.winCombat();
      return;
    }

    SaveSystem.save(this.state);
    UI.render();
  },

  async resolveCard(card, data, explicitTarget) {
    Game.log(`Played ${data.name}.`);

    for (const effect of data.effects) {
      const targets = this.resolveTargets(effect, data, explicitTarget);
      for (const target of targets) {
        await this.applyEffect(effect, target, card, data);
      }
    }
  },

  resolveTargets(effect, cardData, explicitTarget) {
    const combat = this.state.combat;
    const t = effect.target || cardData.targetType;
    if (t === "self") return [this.getPlayerCombatProxy()];
    if (t === "enemy") return explicitTarget ? [explicitTarget] : [];
    if (t === "allEnemies" || cardData.targetType === "allEnemies") return combat.enemies.filter(e => !e.dead && e.hp > 0);
    if (t === "randomEnemy") {
      const living = combat.enemies.filter(e => !e.dead && e.hp > 0);
      return living.length ? [Util.choice(living)] : [];
    }
    return explicitTarget ? [explicitTarget] : [this.getPlayerCombatProxy()];
  },

  async applyEffect(effect, target, card, cardData) {
    switch (effect.type) {
      case "damage": {
        const hits = effect.hits || 1;
        for (let i = 0; i < hits; i++) {
          const amount = this.calculateDamage(effect.amount, this.getPlayerCombatProxy(), target, cardData);
          this.dealDamage(target, amount, this.getPlayerCombatProxy());
          await Util.sleep(90);
        }
        break;
      }

      case "block": {
        this.gainBlock(this.getPlayerCombatProxy(), effect.amount);
        break;
      }

      case "draw": {
        this.drawCards(effect.amount);
        break;
      }

      case "gainEnergy": {
        this.state.combat.energy += effect.amount;
        Toast.floatAtCenter(`+${effect.amount} Energy`, "#7be7ff");
        break;
      }

      case "applyStatus": {
        const statusTarget = effect.target === "self" ? this.getPlayerCombatProxy() : target;
        this.addStatus(statusTarget, effect.status, effect.amount);
        break;
      }

      case "heal": {
        if (effect.target === "self") this.healPlayer(effect.amount);
        break;
      }

      case "cleanse": {
        const unit = effect.target === "self" ? this.getPlayerCombatProxy() : target;
        for (const s of effect.statuses) delete unit.statuses[s];
        Toast.floatAtCenter("Cleansed", "#dff6ff");
        break;
      }

      case "doubleStatus": {
        const current = target.statuses[effect.status] || 0;
        if (current > 0) this.addStatus(target, effect.status, current);
        break;
      }

      case "gainPower": {
        this.state.combat.powers[effect.power] = (this.state.combat.powers[effect.power] || 0) + effect.amount;
        Toast.floatAtCenter("Power awakened", "#b98cff");
        break;
      }

      case "returnDiscardToHand": {
        this.returnDiscardToHand(effect.amount, effect.temporaryCost);
        break;
      }

      case "upgradeRandomInHand": {
        this.upgradeRandomInHand(effect.amount);
        break;
      }

      case "loseHp": {
        this.losePlayerHp(effect.amount);
        break;
      }
    }

    UI.render();
    await Util.sleep(80);
  },

  calculateDamage(base, source, target, cardData) {
    let amount = base;
    if (cardData.type === "Attack") amount += source.statuses?.strength || 0;
    if (source.statuses?.weak) amount = Math.floor(amount * 0.75);
    if (target.statuses?.vulnerable) amount = Math.floor(amount * 1.5);
    if (target.statuses?.mark && cardData.type === "Attack") amount += target.statuses.mark;
    return Math.max(0, amount);
  },

  calculateBlock(base, unit) {
    let amount = base + (unit.statuses?.dexterity || 0);
    if (unit.statuses?.frail) amount = Math.floor(amount * 0.75);
    return Math.max(0, amount);
  },

  gainBlock(unit, rawAmount) {
    const amount = this.calculateBlock(rawAmount, unit);
    unit.block = (unit.block || 0) + amount;
    AudioSystem.block();
    Toast.floatNearUnit(unit, `+${amount} Block`, "#7bd6ff");
    Game.log(`${unit.name || "Player"} gained ${amount} block.`);
  },

  dealDamage(target, amount, source = null) {
    if (!target || target.dead) return 0;
    const blocked = Math.min(target.block || 0, amount);
    target.block = Math.max(0, (target.block || 0) - blocked);
    const hpDamage = Math.max(0, amount - blocked);
    target.hp = Math.max(0, target.hp - hpDamage);

    AudioSystem.hit();
    Toast.floatNearUnit(target, hpDamage > 0 ? `-${hpDamage}` : "Blocked", hpDamage > 0 ? "#ff617d" : "#7bd6ff");
    UI.flashUnit(target);

    if (source && target.statuses?.thorns && source !== target) {
      const thornDamage = target.statuses.thorns;
      source.hp = Math.max(0, source.hp - thornDamage);
      Toast.floatNearUnit(source, `-${thornDamage} Thorns`, "#ffae5a");
      UI.flashUnit(source);
    }

    if (target.hp <= 0) {
      target.dead = true;
      target.block = 0;
      Game.log(`${target.name || "Player"} was defeated.`);
    }

    return hpDamage;
  },

  addStatus(unit, status, amount) {
    if (!unit.statuses) unit.statuses = {};
    unit.statuses[status] = (unit.statuses[status] || 0) + amount;
    Toast.floatNearUnit(unit, `${STATUS_META[status]?.label || status} ${Util.formatSigned(amount)}`, "#f5c35b");
    Game.log(`${unit.name || "Player"} gained ${amount} ${status}.`);
  },

  healPlayer(amount) {
    const run = this.state.run;
    const before = run.hp;
    run.hp = Math.min(run.maxHp, run.hp + amount);
    const healed = run.hp - before;
    if (healed > 0) {
      Toast.floatAtCenter(`Healed ${healed}`, "#7af6a3");
      Game.log(`Healed ${healed} HP.`);
    }
  },

  losePlayerHp(amount) {
    const run = this.state.run;
    run.hp = Math.max(0, run.hp - amount);
    Toast.floatNearUnit(run, `-${amount} HP`, "#ff617d");
    if (run.hp <= 0) this.loseRun();
  },

  returnDiscardToHand(amount, temporaryCost) {
    const combat = this.state.combat;
    for (let i = 0; i < amount; i++) {
      if (!combat.discardPile.length) break;
      const idx = Math.floor(Math.random() * combat.discardPile.length);
      const card = combat.discardPile.splice(idx, 1)[0];
      card.tempCost = temporaryCost;
      combat.hand.push(card);
      Game.log(`${getCardData(card).name} returned from discard.`);
    }
  },

  upgradeRandomInHand(amount) {
    const candidates = this.state.combat.hand.filter(c => !c.upgraded && CARD_DB[c.cardId].upgrade);
    const chosen = Util.sample(candidates, amount);
    for (const card of chosen) {
      card.upgraded = true;
      Game.log(`${getCardData(card).name} upgraded for this combat.`);
    }
    if (chosen.length) Toast.floatAtCenter("Card upgraded", "#f5c35b");
  },

  async endTurn() {
    const combat = this.state.combat;
    if (!combat || combat.phase !== "player") return;
    AudioSystem.click();
    combat.phase = "enemy";
    this.state.selectedCardUid = null;

    while (combat.hand.length) combat.discardPile.push(combat.hand.pop());
    this.getPlayerCombatProxy().block = 0;
    Game.log("You ended your turn.");
    UI.render();

    await Util.sleep(350);
    await this.enemyTurn();
  },

  async enemyTurn() {
    const combat = this.state.combat;
    const player = this.getPlayerCombatProxy();

    this.tickStartOfTurn(player);
    if (player.hp <= 0) {
      this.loseRun();
      return;
    }

    for (const enemy of combat.enemies) {
      if (enemy.dead || enemy.hp <= 0) continue;
      enemy.block = 0;
      this.tickStartOfTurn(enemy);
      if (enemy.hp <= 0) {
        enemy.dead = true;
        continue;
      }
      this.gainBlockFromPlated(enemy);
      await this.executeEnemyIntent(enemy);
      this.endEnemyStatusGain(enemy);
      if (player.hp <= 0) {
        this.loseRun();
        return;
      }
      await Util.sleep(260);
    }

    this.checkEnemyDeaths();
    if (this.areAllEnemiesDefeated()) {
      this.winCombat();
      return;
    }

    this.ensureEnemyIntents();
    this.startPlayerTurn();
  },

  async executeEnemyIntent(enemy) {
    const intent = enemy.intent || ENEMY_DB[enemy.id].chooseIntent(enemy, this.state.combat);
    const player = this.getPlayerCombatProxy();
    Game.log(`${enemy.name} uses ${intent.label}.`);
    Toast.floatNearUnit(enemy, intent.label, "#d8e6ff");

    switch (intent.type) {
      case "attack": {
        this.enemyAttack(enemy, intent.amount);
        break;
      }

      case "multiAttack": {
        for (let i = 0; i < intent.hits; i++) {
          this.enemyAttack(enemy, intent.amount);
          await Util.sleep(120);
          if (player.hp <= 0) break;
        }
        break;
      }

      case "defend": {
        enemy.block = (enemy.block || 0) + intent.amount;
        Toast.floatNearUnit(enemy, `+${intent.amount} Block`, "#7bd6ff");
        break;
      }

      case "buff": {
        this.addStatus(enemy, intent.status, intent.amount);
        break;
      }

      case "debuff": {
        this.addStatus(player, intent.status, intent.amount);
        break;
      }

      case "attackDebuff": {
        this.enemyAttack(enemy, intent.amount);
        if (player.hp > 0) this.addStatus(player, intent.status, intent.statusAmount);
        break;
      }

      case "defendBuff": {
        enemy.block = (enemy.block || 0) + intent.amount;
        this.addStatus(enemy, intent.status, intent.statusAmount);
        Toast.floatNearUnit(enemy, `+${intent.amount} Block`, "#7bd6ff");
        break;
      }

      case "bossPhase": {
        enemy.block = (enemy.block || 0) + 8;
        this.addStatus(enemy, intent.status, intent.amount);
        Toast.floatAtCenter("The Seraph awakens", "#ff70bd");
        break;
      }
    }

    UI.render();
  },

  enemyAttack(enemy, base) {
    const player = this.getPlayerCombatProxy();
    let amount = base + (enemy.statuses.strength || 0);
    if (enemy.statuses.weak) amount = Math.floor(amount * 0.75);
    if (player.statuses.vulnerable) amount = Math.floor(amount * 1.5);
    this.dealDamage(player, Math.max(0, amount), enemy);
  },

  tickStartOfTurn(unit) {
    if (!unit.statuses) unit.statuses = {};
    if (unit.statuses.poison > 0) {
      AudioSystem.poison();
      this.dealPureStatusDamage(unit, unit.statuses.poison, "Poison");
      unit.statuses.poison = Math.max(0, unit.statuses.poison - 1);
      if (unit.statuses.poison === 0) delete unit.statuses.poison;
    }
    if (unit.statuses.burn > 0) {
      this.dealPureStatusDamage(unit, unit.statuses.burn, "Burn");
      unit.statuses.burn = Math.max(0, unit.statuses.burn - 1);
      if (unit.statuses.burn === 0) delete unit.statuses.burn;
    }
  },

  dealPureStatusDamage(unit, amount, label) {
    unit.hp = Math.max(0, unit.hp - amount);
    Toast.floatNearUnit(unit, `-${amount} ${label}`, label === "Poison" ? "#7af68d" : "#ffae5a");
    UI.flashUnit(unit);
    if (unit.hp <= 0) unit.dead = true;
  },

  gainBlockFromPlated(unit) {
    if (unit.statuses?.plated > 0) {
      unit.block = (unit.block || 0) + unit.statuses.plated;
      Toast.floatNearUnit(unit, `+${unit.statuses.plated} Plate`, "#7bd6ff");
    }
  },

  decrementPlayerTurnStatuses() {
    const s = this.getPlayerCombatProxy().statuses || {};
    for (const key of ["weak", "vulnerable", "frail"]) {
      if (s[key] > 0) {
        s[key] -= 1;
        if (s[key] <= 0) delete s[key];
      }
    }
  },

  endEnemyStatusGain(enemy) {
    if (enemy.statuses?.ritual > 0) {
      this.addStatus(enemy, "strength", enemy.statuses.ritual);
    }

    for (const key of ["weak", "vulnerable", "frail", "mark"]) {
      if (enemy.statuses[key] > 0) {
        enemy.statuses[key] -= 1;
        if (enemy.statuses[key] <= 0) delete enemy.statuses[key];
      }
    }
  },

  checkEnemyDeaths() {
    for (const enemy of this.state.combat.enemies) {
      if (enemy.hp <= 0) {
        enemy.dead = true;
        enemy.block = 0;
      }
    }
  },

  areAllEnemiesDefeated() {
    return this.state.combat.enemies.every(e => e.dead || e.hp <= 0);
  },

  winCombat() {
    const encounter = ENCOUNTERS[this.state.run.encounterIndex];
    Game.log(`${encounter.name} cleared.`);
    this.state.run.defeated += 1;
    this.state.run.block = 0;
    this.state.run.statuses = {};
    this.applyRelicHook("onCombatReward");

    if (encounter.type === "boss") {
      SaveSystem.clear();
      this.state.screen = "win";
      AudioSystem.victory();
      UI.render();
      return;
    }

    this.createReward();
  },

  loseRun() {
    this.state.screen = "lose";
    SaveSystem.clear();
    AudioSystem.defeat();
    UI.render();
  },

  createReward() {
    const nextIndex = this.state.run.encounterIndex + 1;
    const cardChoices = RewardSystem.generateCardChoices();
    const relicOffer = this.state.run.defeated === 2 ? RewardSystem.generateRelicChoices() : [];
    this.state.reward = {
      cardChoices,
      relicOffer,
      pickedCard: false,
      pickedRelic: relicOffer.length === 0,
      nextIndex,
      canUpgrade: true,
      canHeal: true,
      canRemove: true
    };
    this.state.screen = "reward";
    SaveSystem.save(this.state);
    UI.render();
  }
};

/* =============================================================================
   REWARD AND PROGRESSION
============================================================================= */

const RewardSystem = {
  generateCardChoices() {
    const entries = Object.values(CARD_DB)
      .filter(c => c.id !== "strike" && c.id !== "guard")
      .map(card => ({
        item: card.id,
        weight: RARITY_WEIGHT[card.rarity] || 10
      }));

    const chosen = [];
    while (chosen.length < CONFIG.rewardCardChoices) {
      const id = Util.weightedChoice(entries);
      if (!chosen.includes(id)) chosen.push(id);
    }
    return chosen;
  },

  generateRelicChoices() {
    const owned = new Set(Game.state.run.relics);
    const available = Object.values(RELIC_DB).filter(r => !owned.has(r.id));
    return Util.sample(available.map(r => r.id), 3);
  },

  chooseCard(cardId) {
    if (!Game.state.reward || Game.state.reward.pickedCard) return;
    Game.state.run.deck.push(createCardInstance(cardId));
    Game.state.reward.pickedCard = true;
    Game.log(`Added ${CARD_DB[cardId].name} to deck.`);
    AudioSystem.card();
    this.maybeContinue();
  },

  skipCard() {
    if (!Game.state.reward || Game.state.reward.pickedCard) return;
    Game.state.reward.pickedCard = true;
    Game.log("Skipped card reward.");
    AudioSystem.click();
    this.maybeContinue();
  },

  chooseRelic(relicId) {
    if (!Game.state.reward || Game.state.reward.pickedRelic) return;
    Game.state.run.relics.push(relicId);
    Game.state.reward.pickedRelic = true;
    Game.log(`Gained relic: ${RELIC_DB[relicId].name}.`);
    AudioSystem.victory();
    this.maybeContinue();
  },

  upgradeDeckCard(cardUid) {
    const card = Game.state.run.deck.find(c => c.uid === cardUid);
    if (!card || card.upgraded || !CARD_DB[card.cardId].upgrade) return;
    card.upgraded = true;
    Game.state.run.upgradedThisRun += 1;
    Game.state.reward.canUpgrade = false;
    Game.log(`Upgraded ${getCardData(card).name}.`);
    AudioSystem.card();
    UI.closeModal();
    UI.render();
    SaveSystem.save(Game.state);
  },

  removeDeckCard(cardUid) {
    const deck = Game.state.run.deck;
    if (deck.length <= 6) {
      Toast.show("Deck is too small to remove more cards.");
      return;
    }
    const idx = deck.findIndex(c => c.uid === cardUid);
    if (idx < 0) return;
    const removed = deck.splice(idx, 1)[0];
    Game.state.run.removedThisRun += 1;
    Game.state.reward.canRemove = false;
    Game.log(`Removed ${getCardData(removed).name}.`);
    AudioSystem.click();
    UI.closeModal();
    UI.render();
    SaveSystem.save(Game.state);
  },

  heal() {
    if (!Game.state.reward?.canHeal) return;
    CombatEngine.healPlayer(10);
    Game.state.reward.canHeal = false;
    AudioSystem.block();
    UI.render();
    SaveSystem.save(Game.state);
  },

  maybeContinue() {
    const reward = Game.state.reward;
    if (!reward) return;
    SaveSystem.save(Game.state);
    UI.render();

    if (reward.pickedCard && reward.pickedRelic) {
      setTimeout(() => this.advance(), 320);
    }
  },

  advance() {
    const reward = Game.state.reward;
    if (!reward) return;

    if (reward.nextIndex === 2) {
      EventSystem.showEvent();
      return;
    }

    Game.state.run.encounterIndex = reward.nextIndex;
    Game.state.reward = null;
    Game.state.screen = "combat";
    CombatEngine.startEncounter(Game.state.run.encounterIndex);
  },

  forceContinue() {
    const reward = Game.state.reward;
    if (!reward) return;
    if (!reward.pickedCard) this.skipCard();
    if (!reward.pickedRelic) {
      const first = reward.relicOffer[0];
      if (first) this.chooseRelic(first);
      else reward.pickedRelic = true;
    }
    this.advance();
  }
};

const EventSystem = {
  showEvent() {
    Game.state.screen = "event";
    Game.state.event = {
      title: "The Mirror Camp",
      text: "A quiet camp flickers inside a cracked reflection. You may rest, refine a card, or sacrifice a memory before the path bends toward the final gate.",
      used: false
    };
    SaveSystem.save(Game.state);
    UI.render();
  },

  rest() {
    if (Game.state.event.used) return;
    CombatEngine.healPlayer(18);
    Game.state.event.used = true;
    this.continueAfterEvent();
  },

  upgrade() {
    if (Game.state.event.used) return;
    UI.openDeckModal("Choose a card to permanently upgrade", "upgrade-event");
  },

  remove() {
    if (Game.state.event.used) return;
    UI.openDeckModal("Choose a card to remove from your deck", "remove-event");
  },

  finishUpgrade(cardUid) {
    const card = Game.state.run.deck.find(c => c.uid === cardUid);
    if (!card || card.upgraded || !CARD_DB[card.cardId].upgrade) return;
    card.upgraded = true;
    Game.state.event.used = true;
    Game.log(`The mirror upgraded ${getCardData(card).name}.`);
    UI.closeModal();
    this.continueAfterEvent();
  },

  finishRemove(cardUid) {
    const deck = Game.state.run.deck;
    if (deck.length <= 6) {
      Toast.show("Deck is too small to sacrifice more cards.");
      return;
    }
    const idx = deck.findIndex(c => c.uid === cardUid);
    if (idx < 0) return;
    const removed = deck.splice(idx, 1)[0];
    Game.state.event.used = true;
    Game.log(`Sacrificed ${getCardData(removed).name}.`);
    UI.closeModal();
    this.continueAfterEvent();
  },

  continueAfterEvent() {
    AudioSystem.victory();
    Game.state.run.encounterIndex = 2;
    Game.state.reward = null;
    Game.state.event = null;
    Game.state.screen = "combat";
    SaveSystem.save(Game.state);
    setTimeout(() => CombatEngine.startEncounter(2), 350);
  }
};

  renderEnemy(enemy) {

    const targetable = Game.state.selectedCardUid && !enemy.dead ? "targetable" : "";
    return `
      <div class="enemy ${targetable} ${enemy.dead ? "dead" : ""}" data-enemy="${enemy.uid}" data-unit="${enemy.uid}">
        <div class="enemy-name"><span>${enemy.name}</span><span>${enemy.hp}/${enemy.maxHp}</span></div>

        <div class="enemy-silhouette" style="background:linear-gradient(135deg, ${def.color[0]}, ${def.color[1]});"></div>

  },

  renderPile(label, count) {
    return `<div class="pile"><b>${count}</b><span>${label}</span></div>`;
  },

  renderStatuses(statuses) {
    const entries = Object.entries(statuses || {}).filter(([, v]) => v > 0);
    if (!entries.length) return `<span class="status" data-tip="No active statuses.">Clear</span>`;
    return entries.map(([key, value]) => {
      const meta = STATUS_META[key] || { label: key.toUpperCase(), icon: "•", tip: key };
      return `<span class="status" data-tip="${this.escape(meta.tip)}">${meta.icon} ${meta.label} ${value}</span>`;
    }).join("");
  },

  renderRelic(id) {
    const relic = RELIC_DB[id];
    if (!relic) return "";
    return `<div class="relic" data-tip="${this.escape(`${relic.name}: ${relic.description}`)}">${relic.icon}</div>`;
  },

  renderLogPanel() {
    return `
      <aside class="panel">
        <div class="panel-header">
          <h3>Combat Log</h3>
          <span class="pill">Recent</span>
        </div>
        <div class="panel-body">
          <div class="log">
            ${Game.state.log.map(m => `<div>${this.escape(m)}</div>`).join("") || `<div>The breach is quiet.</div>`}
          </div>
        </div>
      </aside>
    `;
  },

  renderReward() {
    const reward = Game.state.reward;
    const run = Game.state.run;
    this.app.innerHTML = `
      <main class="screen reward-screen">
        <section class="reward-box">
          <div class="eyebrow">Encounter Cleared</div>
          <h2>Choose Your Reward</h2>
          <p class="subtitle" style="margin-left:0; margin-right:0;">
            HP ${run.hp}/${run.maxHp}. Your deck has ${run.deck.length} cards. Choose carefully; every card changes the run.
          </p>

          ${!reward.pickedCard ? `
            <h3 style="text-align:center; margin-top:22px;">Add one card to your deck</h3>
            <div class="reward-cards">
              ${reward.cardChoices.map(id => this.renderCardElement(createCardInstance(id), { zone: "reward", rewardId: id })).join("")}
            </div>
            <div class="reward-actions">
              <button class="ghost" data-action="skip-card">Skip Card Reward</button>
            </div>
          ` : `
            <div class="notice" style="text-align:center; margin-top:20px;">Card reward resolved.</div>
          `}

          ${reward.relicOffer && reward.relicOffer.length && !reward.pickedRelic ? `
            <h3 style="text-align:center; margin-top:26px;">Choose one relic</h3>
            <div class="reward-actions">
              ${reward.relicOffer.map(id => {
                const r = RELIC_DB[id];
                return `<button data-action="choose-relic" data-relic="${id}"><span style="font-size:22px;">${r.icon}</span> <strong>${r.name}</strong><br><small>${r.description}</small></button>`;
              }).join("")}
            </div>
          ` : ""}

          <h3 style="text-align:center; margin-top:28px;">Optional camp services</h3>
          <div class="reward-actions">
            <button data-action="reward-heal" ${reward.canHeal ? "" : "disabled"}>Heal 10 HP</button>
            <button data-action="reward-upgrade" ${reward.canUpgrade ? "" : "disabled"}>Upgrade a Card</button>
            <button data-action="reward-remove" ${reward.canRemove ? "" : "disabled"}>Remove a Card</button>
            <button class="primary" data-action="continue-reward">Continue</button>
          </div>
        </section>
      </main>
    `;

    this.bindGlobalActions();
    this.bindRewardActions();
  },

  renderEvent() {
    const event = Game.state.event;
    this.app.innerHTML = `
      <main class="screen event-screen">
        <section class="event-box">
          <div class="eyebrow">Branch Event</div>
          <h2>${event.title}</h2>
          <p class="subtitle" style="margin-left:0; margin-right:0;">${event.text}</p>
          <div class="event-actions">
            <button class="primary" data-action="event-rest">Rest: Heal 18 HP</button>
            <button data-action="event-upgrade">Refine: Upgrade a Card</button>
            <button data-action="event-remove">Sacrifice: Remove a Card</button>
          </div>
          <div style="margin-top:24px;">
            <h3>Your Deck</h3>
            <div class="deck-view">
              ${Game.state.run.deck.map(card => this.renderMiniCard(card)).join("")}
            </div>
          </div>
        </section>
      </main>
    `;
    this.bindGlobalActions();
    this.bindEventActions();
  },

  renderResult(won) {
    const run = Game.state.run;
    this.app.innerHTML = `
      <main class="screen result-screen">
        <section class="logo">
          <div class="eyebrow">${won ? "Run Complete" : "Run Failed"}</div>
          <h1>${won ? "Victory" : "Defeat"}</h1>
          <p class="subtitle">
            ${won
              ? "The Seraph Engine collapses. Your deck survived the breach."
              : "The breach consumes the run. A new deck may yet find the path."}
          </p>
          <div class="menu-grid">
            <div class="feature-card"><strong>Encounters cleared</strong><span>${run?.defeated || 0}</span></div>
            <div class="feature-card"><strong>Final deck size</strong><span>${run?.deck?.length || 0} cards</span></div>
            <div class="feature-card"><strong>Relics</strong><span>${(run?.relics || []).map(id => RELIC_DB[id]?.name).join(", ") || "None"}</span></div>
          </div>
          <div class="menu-actions">
            <button class="primary" data-action="new-run">Start New Run</button>
            <button class="ghost" data-action="menu">Main Menu</button>
          </div>
        </section>
      </main>
    `;
    this.bindGlobalActions();
  },

  renderCardElement(card, options = {}) {
    const data = getCardData(card);
    const cost = card.tempCost !== null && card.tempCost !== undefined ? card.tempCost : data.cost;
    const [c1, c2] = data.fallbackColor || ["#303853", "#7777ff"];
    const playable = options.zone !== "hand" || CombatEngine.canPlayCard(card);
    const selected = Game.state.selectedCardUid === card.uid;
    const upgradedClass = card.upgraded ? "upgraded" : "";
    const unplayableClass = playable ? "" : "unplayable";
    const selectedClass = selected ? "selected" : "";
    const tip = `${data.type} • ${data.rarity} • ${data.targetType}. ${data.description}`;

    return `
      <div class="card ${upgradedClass} ${unplayableClass} ${selectedClass}"
           data-card="${card.uid}"
           data-reward-card="${options.rewardId || ""}"
           data-tip="${this.escape(tip)}">
        <div class="card-bg" style="--c1:${c1}; --c2:${c2};"></div>
        <div class="card-top">
          <div class="cost">${cost}</div>
          <div class="card-title">${this.escape(data.name)}</div>
        </div>
        <div class="card-art">
          ${data.imagePath ? `<img src="${this.escape(data.imagePath)}" alt="">` : `<div class="sigil">${TYPE_SIGIL[data.type] || "✦"}</div>`}
        </div>
        <div class="card-type">
          <span>${data.type}</span>
          <span class="rarity">${data.rarity}</span>
        </div>
        <div class="card-desc">${this.escape(data.description)}</div>
      </div>
    `;
  },

  renderMiniCard(card) {
    const data = getCardData(card);
    return `
      <div class="mini-card" data-mini-card="${card.uid}">
        <b>${this.escape(data.name)}${card.upgraded ? "+" : ""}</b>
        <span>${data.cost} cost • ${data.type} • ${data.rarity}</span>
      </div>
    `;
  },

  bindGlobalActions() {
    this.app.querySelectorAll("[data-action]").forEach(el => {
      el.addEventListener("click", e => {
        const action = el.dataset.action;
        AudioSystem.ensure();

        if (action === "new-run") {
          if (SaveSystem.hasSave() && Game.state.screen === "menu") {
            if (!confirm("Start a new run and overwrite the saved run?")) return;
          }
          AudioSystem.click();
          Game.newRun();
        }

        if (action === "continue") {
          AudioSystem.click();
          Game.continueRun();
        }

        if (action === "clear-save") {
          AudioSystem.click();
          Game.clearSave();
        }

        if (action === "menu") {
          AudioSystem.click();
          Game.state.screen = "menu";
          UI.render();
        }

        if (action === "save-now") {
          AudioSystem.click();
          SaveSystem.save(Game.state);
          Toast.show("Run saved.");
        }

        if (action === "view-deck") {
          AudioSystem.click();
          this.openDeckModal("Current Deck", "view");
        }

        if (action === "abandon") {
          if (confirm("Abandon this run and return to the main menu?")) {
            SaveSystem.clear();
            Game.state.screen = "menu";
            Game.state.run = null;
            Game.state.combat = null;
            UI.render();
          }
        }
      });
    });
  },

  bindCombatActions() {
    this.app.querySelectorAll(".hand .card").forEach(el => {
      el.addEventListener("click", () => CombatEngine.selectOrPlayCard(el.dataset.card));
    });

    this.app.querySelectorAll(".enemy").forEach(el => {
      el.addEventListener("click", () => CombatEngine.playSelectedCardOnEnemy(el.dataset.enemy));
    });

    const end = this.app.querySelector('[data-action="end-turn"]');
    if (end) end.addEventListener("click", () => CombatEngine.endTurn());
  },

  bindRewardActions() {
    this.app.querySelectorAll("[data-reward-card]").forEach(el => {
      const id = el.dataset.rewardCard;
      if (id) el.addEventListener("click", () => RewardSystem.chooseCard(id));
    });

    const skip = this.app.querySelector('[data-action="skip-card"]');
    if (skip) skip.addEventListener("click", () => RewardSystem.skipCard());

    this.app.querySelectorAll('[data-action="choose-relic"]').forEach(el => {
      el.addEventListener("click", () => RewardSystem.chooseRelic(el.dataset.relic));
    });

    const heal = this.app.querySelector('[data-action="reward-heal"]');
    if (heal) heal.addEventListener("click", () => RewardSystem.heal());

    const upgrade = this.app.querySelector('[data-action="reward-upgrade"]');
    if (upgrade) upgrade.addEventListener("click", () => this.openDeckModal("Choose a card to upgrade", "upgrade-reward"));

    const remove = this.app.querySelector('[data-action="reward-remove"]');
    if (remove) remove.addEventListener("click", () => this.openDeckModal("Choose a card to remove", "remove-reward"));

    const cont = this.app.querySelector('[data-action="continue-reward"]');
    if (cont) cont.addEventListener("click", () => RewardSystem.forceContinue());
  },

  bindEventActions() {
    const rest = this.app.querySelector('[data-action="event-rest"]');
    const upgrade = this.app.querySelector('[data-action="event-upgrade"]');
    const remove = this.app.querySelector('[data-action="event-remove"]');
    if (rest) rest.addEventListener("click", () => EventSystem.rest());
    if (upgrade) upgrade.addEventListener("click", () => EventSystem.upgrade());
    if (remove) remove.addEventListener("click", () => EventSystem.remove());
  },

  openDeckModal(title, mode) {
    this.closeModal();
    const deck = Game.state.run?.deck || [];
    const modal = document.createElement("div");
    modal.className = "deck-modal";
    modal.innerHTML = `
      <div class="deck-modal-inner">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
          <div>
            <div class="eyebrow">${mode === "view" ? "Deck List" : "Deck Action"}</div>
            <h2>${this.escape(title)}</h2>
          </div>
          <button class="ghost" data-modal-close>Close</button>
        </div>
        <div class="modal-grid">
          ${deck.map(card => this.renderCardElement(card, { zone: "modal" })).join("")}
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    this.modal = modal;

    modal.querySelector("[data-modal-close]").addEventListener("click", () => this.closeModal());
    modal.addEventListener("click", e => {
      if (e.target === modal) this.closeModal();
    });

    modal.querySelectorAll(".card").forEach(el => {
      el.addEventListener("click", () => {
        const uid = el.dataset.card;
        if (mode === "view") return;
        if (mode === "upgrade-reward") RewardSystem.upgradeDeckCard(uid);
        if (mode === "remove-reward") RewardSystem.removeDeckCard(uid);
        if (mode === "upgrade-event") EventSystem.finishUpgrade(uid);
        if (mode === "remove-event") EventSystem.finishRemove(uid);
      });
    });
  },

  closeModal() {
    if (this.modal) this.modal.remove();
    this.modal = null;
  },

  animateCardPlay(cardUid) {
    const el = document.querySelector(`[data-card="${cardUid}"]`);
    if (el) el.classList.add("playing");
  },

  shakeCard(cardUid) {
    const el = document.querySelector(`[data-card="${cardUid}"]`);
    if (el) {
      el.classList.remove("shake");
      void el.offsetWidth;
      el.classList.add("shake");
    }
  },

  flashUnit(unit) {
    const selector = unit.uid ? `[data-unit="${unit.uid}"]` : `[data-unit="player"], .player-panel`;
    document.querySelectorAll(selector).forEach(el => {
      el.classList.remove("hit");
      void el.offsetWidth;
      el.classList.add("hit");
    });
  },

  escape(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
};

/* =============================================================================
   ANIMATION HELPERS / TOASTS
============================================================================= */

const Toast = {
  zone: document.getElementById("toastZone"),

  show(message) {
    const el = document.createElement("div");
    el.className = "toast";
    el.textContent = message;
    this.zone.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  },

  floatAtCenter(message, color = "#eef4ff") {
    const el = document.createElement("div");
    el.className = "float-text";
    el.textContent = message;
    el.style.left = "50vw";
    el.style.top = "45vh";
    el.style.color = color;
    this.zone.appendChild(el);
    setTimeout(() => el.remove(), 920);
  },

  floatNearUnit(unit, message, color = "#eef4ff") {
    let rect = null;
    if (unit?.uid) {
      const el = document.querySelector(`[data-unit="${unit.uid}"]`);
      if (el) rect = el.getBoundingClientRect();
    } else {
      const el = document.querySelector(`[data-unit="player"]`) || document.querySelector(".player-panel");
      if (el) rect = el.getBoundingClientRect();
    }

    if (!rect) return this.floatAtCenter(message, color);

    const el = document.createElement("div");
    el.className = "float-text";
    el.textContent = message;
    el.style.left = `${rect.left + rect.width / 2}px`;
    el.style.top = `${rect.top + rect.height * 0.28}px`;
    el.style.color = color;
    this.zone.appendChild(el);
    setTimeout(() => el.remove(), 920);
  }
};

/* =============================================================================
   DEV HELPERS
============================================================================= */

if (DEBUG_MODE) {
  window.debugGame = Game;
  window.debugCombat = CombatEngine;
  window.debugCards = CARD_DB;
  window.debugEnemies = ENEMY_DB;
  window.debugRelics = RELIC_DB;
}

/* =============================================================================
   BOOT
============================================================================= */

window.addEventListener("beforeunload", () => {
  if (Game.state.run && Game.state.screen !== "win" && Game.state.screen !== "lose") {
    SaveSystem.save(Game.state);
  }
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    Game.state.selectedCardUid = null;
    UI.closeModal();
    UI.render();
  }

  if (e.key.toLowerCase() === "e" && Game.state.screen === "combat") {
    CombatEngine.endTurn();
  }
});

CombatEngine.bindState(Game.state);
UI.render();
</script>

</body>
</html>
